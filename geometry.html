<div class="container"><div class="card">
<h2>Geometry Lesson</h2>
<div class="lesson-box"><p>
    <img src="geo.png" alt="Geometry location" width="450">
</p></div>
<button onclick="location.href='geoworkings.html'">Wokred Solutions</button>

<p id="question"></p>
<input id="answer"><button onclick="submitAnswer()">Submit</button>
</div></div>
<script>
function runQuiz(questions){
let q=0; let score=0;
const qEl=document.getElementById("question");
const aEl=document.getElementById("answer");
function show(){ qEl.innerText=questions[q].question; }
window.submitAnswer=function(){
if(aEl.value.trim()==questions[q].answer) score++;
aEl.value="";
q++;
if(q<questions.length) show(); else finish();
}
function finish(){
let board=JSON.parse(localStorage.getItem("leaderboard"))||[];
board.push({name:localStorage.getItem("currentUser"),score:score});
board.sort((a,b)=>b.score-a.score);
localStorage.setItem("leaderboard",JSON.stringify(board));
window.location.href="leaderboard.html";
}
show();
}
runQuiz([
{question:"Triangle angles total?",answer:"180"},
{question:"Square sides?",answer:"4"},
{question:"Right angle degrees?",answer:"90"},
{question:"Rectangle area = ? x width",answer:"length"},
{question:"Circle full rotation?",answer:"360"}
]);
</script>
